spring:
  application:
    name: compra-venta-monolito

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/compraventa}
    username: ${DB_USER:compraventa}
    password: ${DB_PASSWORD:compraventa}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  security:
    max-login-attempts: 5
    session-timeout-minutes: 60
  wallet:
    currency: ARS
    max-balance: 10000000
  search:
    max-results: 50
  notifications:
    enabled: true
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:your-project-id}
    issuer-uri: https://securetoken.google.com/${FIREBASE_PROJECT_ID:your-project-id}
    jwk-set-uri: https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com
