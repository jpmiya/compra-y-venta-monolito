name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Monolito (TP1) — sigue corriendo como red de regresión
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: compra_venta_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/compra_venta_db
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/compra_venta_test
          FIREBASE_SERVICE_ACCOUNT_PATH: ""
          ENCRYPTION_KEY: "dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXRlc3Q="
        run: pytest tests/ -v

  # Microservicios — un job por servicio, cada uno con su Postgres en el puerto
  # que espera su tests/conftest.py (identidad:5435, billetera:5437, catalogo:5439,
  # delivery:5441, carrito:5443)
  test-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identidad
            port: 5435
            db: identidad_test
          - service: billetera
            port: 5437
            db: billetera_test
          - service: catalogo
            port: 5439
            db: catalogo_test
          - service: delivery
            port: 5441
            db: delivery_test
          - service: carrito
            port: 5443
            db: carrito_test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pass123
          POSTGRES_DB: ${{ matrix.db }}
        ports:
          - ${{ matrix.port }}:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        env:
          FIREBASE_SERVICE_ACCOUNT_PATH: ""
          BROKER_ENABLED: "false"
        run: pytest tests/ -v
