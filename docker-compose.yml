services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: compra_venta_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Base de datos SOLO para los tests. Matchea el default de tests/conftest.py
  # (localhost:5433, db compra_venta_test, pass123) para que `pytest` corra sin
  # setear TEST_DATABASE_URL. Efímera (sin volumen): el schema lo crea conftest.
  test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: compra_venta_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Message broker — solo para el delivery asincrónico (post-pivote, con canales de respuesta múltiples)
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Servicio 1: Identidad y Acceso ---
  identidad-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: identidad_db
    ports:
      - "5434:5432"
    volumes:
      - identidad_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  identidad-test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: identidad_test
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  identidad:
    build: ./services/identidad
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:pass123@identidad-db:5432/identidad_db
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      identidad-db:
        condition: service_healthy
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    profiles: ["microservices"]

  # --- Servicio 2: Billetera ---
  billetera-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: billetera_db
    ports:
      - "5436:5432"
    volumes:
      - billetera_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  billetera-test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: billetera_test
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  billetera:
    build: ./services/billetera
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:pass123@billetera-db:5432/billetera_db
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
      IDENTIDAD_SERVICE_URL: http://identidad:8000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      BILLETERA_LIMITE_CARGA: "100000"
      BILLETERA_MONEDA: ARS
    depends_on:
      billetera-db:
        condition: service_healthy
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    profiles: ["microservices"]

  # --- Servicio 3: Catálogo ---
  catalogo-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: catalogo_db
    ports:
      - "5438:5432"
    volumes:
      - catalogo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalogo-test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: catalogo_test
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalogo:
    build: ./services/catalogo
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:pass123@catalogo-db:5432/catalogo_db
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
      IDENTIDAD_SERVICE_URL: http://identidad:8000
    depends_on:
      catalogo-db:
        condition: service_healthy
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    profiles: ["microservices"]

  # --- Servicio 4: Delivery ---
  delivery-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: delivery_db
    ports:
      - "5440:5432"
    volumes:
      - delivery_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  delivery-test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: delivery_test
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  delivery:
    build: ./services/delivery
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:pass123@delivery-db:5432/delivery_db
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
      IDENTIDAD_SERVICE_URL: http://identidad:8000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      delivery-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    profiles: ["microservices"]

  # --- Servicio 5: Carrito & Checkout (orquestador de la saga) ---
  carrito-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: carrito_db
    ports:
      - "5442:5432"
    volumes:
      - carrito_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  carrito-test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: carrito_test
    ports:
      - "5443:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  carrito:
    build: ./services/carrito
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:pass123@carrito-db:5432/carrito_db
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
      IDENTIDAD_SERVICE_URL: http://identidad:8000
      BILLETERA_SERVICE_URL: http://billetera:8000
      CATALOGO_SERVICE_URL: http://catalogo:8000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      carrito-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    profiles: ["microservices"]

  # --- API Gateway: única puerta de entrada (bloquea /interno/*) ---
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identidad
      - billetera
      - catalogo
      - delivery
      - carrito
    profiles: ["microservices"]

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/compra_venta_db
      FIREBASE_SERVICE_ACCOUNT_PATH: ./firebase-service-account.json
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY:-}
      FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      SEGURIDAD_MAX_INTENTOS_LOGIN: "5"
      SEGURIDAD_TIEMPO_SESION_MINUTOS: "60"
      BILLETERA_LIMITE_CARGA: "100000"
      BILLETERA_MONEDA: ARS
      BUSQUEDA_MAX_RESULTADOS: "100"
      NOTIFICACIONES_EMAIL_HABILITADO: "false"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro

volumes:
  postgres_data:
  identidad_data:
  billetera_data:
  catalogo_data:
  delivery_data:
  carrito_data:
