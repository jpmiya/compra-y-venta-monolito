# API Gateway — única puerta de entrada del sistema de microservicios (puerto 8080).
#
# Enruta cada recurso a su servicio dueño y BLOQUEA los endpoints /interno/*
# (comunicación exclusiva entre servicios, nunca expuesta al cliente).
#
# Decisión: nginx como gateway (vs. FastAPI propio o Kong/Traefik) — cero código,
# estándar de facto, y el TP solo pide "un gateway de cara al cliente".

events {
    worker_connections 1024;
}

http {
    # Resolver de Docker para nombres de servicio
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream identidad { server identidad:8000; }
    upstream billetera { server billetera:8000; }
    upstream catalogo  { server catalogo:8000; }
    upstream delivery  { server delivery:8000; }
    upstream carrito   { server carrito:8000; }

    server {
        listen 8080;

        # Los /interno/* jamás salen del perímetro
        location ~ ^/interno/ {
            return 403 '{"detail":"Endpoint interno: solo accesible entre servicios"}';
        }

        # --- Identidad y Acceso ---
        location /registro    { proxy_pass http://identidad; }
        location /personas    { proxy_pass http://identidad; }
        location /usuarios    { proxy_pass http://identidad; }
        location /direcciones { proxy_pass http://identidad; }

        # --- Billetera ---
        location /billetera   { proxy_pass http://billetera; }

        # --- Catálogo (productos + búsqueda) ---
        location /productos   { proxy_pass http://catalogo; }
        location /busqueda    { proxy_pass http://catalogo; }

        # --- Delivery ---
        location /deliveries  { proxy_pass http://delivery; }

        # --- Carrito & Checkout (orquestador de la saga) ---
        location /carrito     { proxy_pass http://carrito; }

        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # Headers estándar de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }
}
