{% extends "base.html" %}
{% block title %}Editar dirección{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>Editar dirección</h2>

    <form method="post" action="/direcciones/{{ direccion.id }}/editar">
      <div class="mb-3">
        <label class="form-label">Calle *</label>
        <input type="text" name="calle" class="form-control" required value="{{ direccion.calle }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Número *</label>
        <input type="text" name="numero" class="form-control" required value="{{ direccion.numero }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Ciudad *</label>
        <input type="text" name="ciudad" class="form-control" required value="{{ direccion.ciudad }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Provincia *</label>
        <input type="text" name="provincia" class="form-control" required value="{{ direccion.provincia }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <input type="text" name="descripcion" class="form-control"
               value="{{ direccion.descripcion or '' }}">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="/personas/{{ direccion.persona_id }}/direcciones" class="btn btn-outline-secondary">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
