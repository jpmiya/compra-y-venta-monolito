{% extends "base.html" %}
{% block title %}{{ "Editar" if producto else "Nuevo" }} Producto{% endblock %}
{% block content %}

<h2>{{ "Editar" if producto else "Nuevo" }} Producto</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" class="mt-3" style="max-width:600px">
  <div class="mb-3">
    <label class="form-label">Nombre *</label>
    <input type="text" name="nombre" class="form-control" required
           value="{{ producto.nombre if producto else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Descripción *</label>
    <textarea name="descripcion" class="form-control" rows="3" required>{{ producto.descripcion if producto else '' }}</textarea>
  </div>
  <div class="row">
    <div class="col mb-3">
      <label class="form-label">Precio *</label>
      <input type="number" name="precio" class="form-control" step="0.01" min="0.01" required
             value="{{ producto.precio if producto else '' }}">
    </div>
    <div class="col mb-3">
      <label class="form-label">Stock *</label>
      <input type="number" name="stock" class="form-control" min="0" required
             value="{{ producto.stock if producto else 0 }}">
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">SKU *</label>
    <input type="text" name="sku" class="form-control" required
           value="{{ producto.sku if producto else '' }}"
           {{ "readonly" if producto else "" }}>
  </div>
  <div class="mb-3">
    <label class="form-label">Categoría *</label>
    <select name="categoria_id" class="form-select" required>
      <option value="">— Seleccioná una categoría —</option>
      {% for c in categorias %}
      <option value="{{ c.id }}" {{ "selected" if producto and producto.categoria_id == c.id else "" }}>
        {{ c.nombre }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Dirección de punto de venta *</label>
    <select name="direccion_punto_venta_id" class="form-select" required>
      <option value="">— Seleccioná una dirección —</option>
      {% for d in direcciones %}
      <option value="{{ d.id }}" {{ "selected" if producto and producto.direccion_punto_venta_id == d.id else "" }}>
        {{ d.calle }} {{ d.numero }}, {{ d.ciudad }} — {{ d.descripcion or "" }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="/ui/productos" class="btn btn-outline-secondary">Cancelar</a>
  </div>
</form>

{% endblock %}
