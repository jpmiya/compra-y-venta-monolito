<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Completar registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width:480px; margin-top:8vh">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h4 class="card-title mb-1">Completar registro</h4>
      <p class="text-muted small mb-4">Primera vez que ingresás. Completá tus datos para continuar.</p>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="post" action="/web/registro">
        <div class="mb-3">
          <label class="form-label">Nombre completo *</label>
          <input type="text" name="nombre_completo" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Documento de identidad *</label>
          <input type="text" name="documento_identidad" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Fecha de nacimiento *</label>
          <input type="date" name="fecha_nacimiento" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Teléfono</label>
          <input type="text" name="telefono" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary w-100">Registrarme</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
