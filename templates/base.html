<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Compra y Venta{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🛒 Compra y Venta</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/ui/busqueda">Buscar</a></li>
        <li class="nav-item"><a class="nav-link" href="/ui/carrito">Carrito</a></li>
        <li class="nav-item"><a class="nav-link" href="/ui/billetera">Billetera</a></li>
        <li class="nav-item"><a class="nav-link" href="/ui/deliveries">Deliveries</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Admin</a>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" href="/ui/personas">Personas</a></li>
            <li><a class="dropdown-item" href="/ui/productos">Productos</a></li>
          </ul>
        </li>
      </ul>
      {% if user %}
      <span class="navbar-text me-3 text-light small">{{ user.email }}</span>
      <form method="post" action="/web/auth/logout" class="d-inline">
        <button class="btn btn-outline-light btn-sm">Salir</button>
      </form>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
